<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QMart SIM Mapper</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#231f20; color:#fff; padding:12px; text-align:center; }
.card { background:#fff; margin:10px; padding:15px; border-radius:8px; }
.btn { padding:12px; width:100%; border:none; border-radius:6px; background:#00b2e3; color:#000; font-weight:bold; }
.dsa-item { padding:10px; border-bottom:1px solid #ddd; cursor:pointer; }
.hidden { display:none; }
</style>
</head>

<body>

<header>QMart SIM Mapper</header>

<div class="card">
  <h3>MDE</h3>
  <input id="mdeName" placeholder="Enter MDE Name">
  <button class="btn" onclick="startSession()">Start</button>
</div>

<div id="mainUI" class="hidden">

  <div class="card">
    <h3 id="mdeTitle"></h3>
    <div id="mdeProgress"></div>
  </div>

  <div class="card">
    <h3>Select DSA</h3>
    <div id="dsaList"></div>
  </div>

  <div class="card">
    <h3>SIM</h3>
    <input id="sim" maxlength="20">
    <button class="btn" onclick="submitSIM()">Submit</button>
  </div>

  <div class="card">
    <h3>My Log</h3>
    <div id="log"></div>
  </div>

  <div class="card">
    <h3>Dashboard</h3>
    <div id="dashboard"></div>
  </div>

</div>

<script>

const SCRIPT_URL = "'https://script.google.com/macros/s/AKfycbx1PO8O5aiK0xf2BMrYok5r6EvqaTYdmBQzrQ2vGJyAG3oHLIm_MeM3e9xQnPlnigKVtg/exec'";

let session = { mdeName: "", dsa:null };

// 🚀 START SESSION
async function startSession(){
  session.mdeName = document.getElementById("mdeName").value;
  document.getElementById("mainUI").classList.remove("hidden");
  document.getElementById("mdeTitle").innerText = session.mdeName;

  await loadMasterList();
  await loadMDEProgress();
  await loadDashboard();
  await loadLog();
}

// 🚀 LOAD DSAs (FILTERED BY BACKEND)
async function loadMasterList(){
  const res = await fetch(`${SCRIPT_URL}?action=getMasterList`);
  const data = await res.json();

  const mde = data.mdes.find(m=>m.name===session.mdeName);
  const list = document.getElementById("dsaList");
  list.innerHTML="";

  if(!mde || !mde.dsas.length){
    list.innerHTML="✅ All DSAs completed";
    return;
  }

  mde.dsas.forEach(d=>{
    const div=document.createElement("div");
    div.className="dsa-item";
    div.innerText=d.name;
    div.onclick=()=>{ session.dsa=d; alert("Selected "+d.name); };
    list.appendChild(div);
  });
}

// 🚀 SUBMIT SIM
async function submitSIM(){
  const sim=document.getElementById("sim").value;

  if(!session.dsa || sim.length!==20){
    alert("Select DSA and valid SIM");
    return;
  }

  const res=await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"submit",
      timestamp:new Date().toISOString(),
      mdeName:session.mdeName,
      mdeNumber:"",
      dsaName:session.dsa.name,
      dsaNumber:session.dsa.number,
      dsaProvince:session.dsa.province,
      dsaShortCode:session.dsa.shortCode,
      simSerial:sim
    })
  });

  const result=await res.json();

  // 🚫 DUPLICATE HANDLING
  if(!result.success){
    alert(result.error);
    return;
  }

  alert("Submitted!");

  document.getElementById("sim").value="";
  session.dsa=null;

  await loadMasterList();
  await loadMDEProgress();
  await loadDashboard();
  await loadLog();
}

// 📊 MDE PROGRESS
async function loadMDEProgress(){
  const res=await fetch(`${SCRIPT_URL}?action=getMDEProgress`);
  const data=await res.json();

  const rec=data.progress.find(p=>p.mde===session.mdeName);
  if(!rec) return;

  document.getElementById("mdeProgress").innerText=
    `${rec.completed} completed / ${rec.remaining} remaining`;
}

// 📋 LOAD LOG
async function loadLog(){
  const res=await fetch(`${SCRIPT_URL}?action=getMyLog&mdeName=${session.mdeName}`);
  const data=await res.json();

  const div=document.getElementById("log");
  div.innerHTML="";

  data.rows.forEach(r=>{
    const d=document.createElement("div");
    d.innerText=`${r.dsaName} - ${r.status}`;
    div.appendChild(d);
  });
}

// 📊 DASHBOARD
async function loadDashboard(){
  const res=await fetch(`${SCRIPT_URL}?action=getDashboard&mdeName=${session.mdeName}`);
  const d=await res.json();

  document.getElementById("dashboard").innerText=
    `Total: ${d.total} | Approved: ${d.approved} | Pending: ${d.pending}`;
}

</script>

</body>
</html>
